app = "trustreply-backend"
primary_region = "ord"

[build]
  # Deploy from within the backend/ directory: cd backend && fly deploy -c ../fly.backend.toml
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1
